<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Media Releases</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #032541;
      --teal:    #01b4e4;
      --teal-d:  #0099c3;
      --green:   #21d07a;
      --yellow:  #d2d531;
      --red:     #db2360;
      --score-bg:#081c22;
      --card-bg: #ffffff;
      --page-bg: #f0f1f0;
      --text:    #000;
      --muted:   #666;
      --border:  #e3e3e3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--page-bg);
      color: var(--text);
      font-family: 'Source Sans 3', 'Source Sans Pro', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--navy);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 64px;
    }
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--teal); }

    /* ── HERO BANNER ── */
    .hero {
      background: linear-gradient(to right, var(--navy) 0%, #1a3a5c 100%);
      padding: 48px 32px;
      text-align: center;
      color: #fff;
    }
    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
    }

    /* ── FILTERS ── */
    .filters-wrap {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .filters {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    .filters button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 18px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filters button:hover { border-color: var(--teal); color: var(--teal); }
    .filters button.active,
    .filters button.active-provider {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
    }
    .filters .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }
    .provider-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .provider-select  { display: none; }
    @media (max-width: 600px) {
      .provider-buttons { display: none; }
      .provider-select {
        display: block;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 20px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--teal);
        background: #fff;
        cursor: pointer;
        outline: none;
      }
    }

    /* ── GRID ── */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
    }
    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 10px;
      overflow: visible;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    /* ── POSTER ── */
    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      overflow: hidden;
      border-radius: 10px 10px 0 0;
      background: #c0c0c0;
    }
    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .card:hover .poster-wrap img { transform: scale(1.03); }

    /* Fallback */
    .poster-fallback {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; text-align: center;
      font-weight: 700; font-size: 0.95rem; color: #fff;
      line-height: 1.3;
    }
    .genre-action  { background: linear-gradient(135deg,#3a0a00,#8b2500); }
    .genre-drama   { background: linear-gradient(135deg,#0a0a2a,#2a1560); }
    .genre-sci-fi  { background: linear-gradient(135deg,#001428,#003060); }
    .genre-comedy  { background: linear-gradient(135deg,#0a2000,#2a4a10); }
    .genre-default { background: linear-gradient(135deg,#1a1a2e,#16213e); }

    /* ── SCORE BADGE ── */
    .score-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      z-index: 5;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .score-badge .score-text sup { font-size: 0.45rem; vertical-align: super; }

    /* ── CARD BODY ── */
    .card-body {
      padding: 12px 12px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-body h2 {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 2px;
      color: var(--text);
    }
    .card-date {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }
    .card-meta span {
      font-size: 0.68rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 1px 7px;
      border-radius: 3px;
    }
    .synopsis {
      font-size: 0.78rem;
      color: #555;
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: auto;
    }
    .btn-trailer {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      background: #e00;
      color: #fff;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
      flex: 1;
      justify-content: center;
    }
    .btn-trailer:hover { background: #c00; }
    .btn-trailer svg { width: 12px; height: 12px; fill: #fff; flex-shrink: 0; }
    .btn-info {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      background: transparent;
      border: 1px solid var(--teal);
      color: var(--teal);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-info:hover { background: var(--teal); color: #fff; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      background: #fff;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Top Media <span>Releases</span></div>
</nav>

<div class="hero">
  <h1>What's new to watch?</h1>
  <p>The latest releases across all major streaming platforms, sorted by rating</p>
</div>

<div class="filters-wrap">
  <div class="filters">
    <button class="active" onclick="setType('movie', this)">Movies</button>
    <button onclick="setType('series', this)">Series</button>
    <div class="divider"></div>
    <!-- Desktop: pill buttons -->
    <div class="provider-buttons">
      <button class="active-provider" onclick="setProvider('all', this)">All Providers</button>
      <button onclick="setProvider('AppleTV', this)">Apple TV+</button>
      <button onclick="setProvider('HBO Max', this)">HBO Max</button>
      <button onclick="setProvider('Netflix', this)">Netflix</button>
      <button onclick="setProvider('Paramount', this)">Paramount+</button>
      <button onclick="setProvider('Hulu', this)">Hulu</button>
      <button onclick="setProvider('Prime', this)">Prime Video</button>
      <button onclick="setProvider('Disney', this)">Disney+</button>
    </div>
    <!-- Mobile: dropdown -->
    <select class="provider-select" onchange="setProviderFromSelect(this)">
      <option value="all">All Providers</option>
      <option value="AppleTV">Apple TV+</option>
      <option value="HBO Max">HBO Max</option>
      <option value="Netflix">Netflix</option>
      <option value="Paramount">Paramount+</option>
      <option value="Hulu">Hulu</option>
      <option value="Prime">Prime Video</option>
      <option value="Disney">Disney+</option>
    </select>
  </div>
</div>

<div class="container">
  <div class="grid" id="mediaGrid"></div>
</div>

<footer>Top Media Releases &bull; Data sourced from TMDB &bull; March 2026</footer>

<script>
const GENRE_MAP = {
  28: 'Action', 12: 'Adventure', 16: 'Animation', 35: 'Comedy',
  80: 'Crime', 99: 'Documentary', 18: 'Drama', 10751: 'Family',
  14: 'Fantasy', 36: 'History', 27: 'Horror', 10402: 'Music',
  9648: 'Mystery', 10749: 'Romance', 878: 'Sci-Fi', 10770: 'TV Movie',
  53: 'Thriller', 10752: 'War', 37: 'Western'
};

function genreClass(genres) {
  const lower = genres.map(g => g.toLowerCase());
  if (lower.some(g => g.includes('action')))  return 'genre-action';
  if (lower.some(g => g.includes('sci')))     return 'genre-sci-fi';
  if (lower.some(g => g.includes('comedy')))  return 'genre-comedy';
  if (lower.some(g => g.includes('drama')))   return 'genre-drama';
  return 'genre-default';
}

function scoreColor(rating) {
  if (!rating) return '#777';
  if (rating >= 7)   return '#21d07a';
  if (rating >= 4)   return '#d2d531';
  return '#db2360';
}

function scoreBadge(rating) {
  const color = scoreColor(rating);
  const label = rating ? parseFloat(rating).toFixed(1) : 'NR';
  return `<div class="score-badge" style="background:${color}">${label}</div>`;
}

const ytSvg = `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path d="M9.545 15.568V8.432L15.818 12z" fill="#fff"/></svg>`;

let allMovies = [];
let allSeries = [];
let currentType = 'movie';
let currentProvider = 'all';

function renderMedia(list) {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;padding:60px 0;">No titles found.</p>';
    return;
  }
  list.forEach(m => {
    const genres = m.genres.length ? m.genres : ['Other'];
    const hasPoster = !!m.poster;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="poster-wrap">
        <img src="${hasPoster ? m.poster : ''}" alt="${m.title}" loading="lazy"
             style="${hasPoster ? '' : 'display:none'}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="poster-fallback ${genreClass(genres)}" style="${hasPoster ? 'display:none' : 'display:flex'}">${m.title}</div>
        ${scoreBadge(m.rating)}
      </div>
      <div class="card-body">
        <h2>${m.title}</h2>
        <div class="card-date">${m.year} &bull; ${m.provider}</div>
        <div class="card-meta">${genres.map(g => `<span>${g}</span>`).join('')}</div>
        <p class="synopsis">${m.synopsis || 'No description available.'}</p>
        <div class="card-actions">
          <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(m.title + ' official trailer')}" target="_blank" rel="noopener" class="btn-trailer">${ytSvg} Trailer</a>
          <a href="${m.tmdb}" target="_blank" rel="noopener" class="btn-info">More Info</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function setType(type, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // restore active-provider highlight
  document.querySelectorAll('.filters button').forEach(b => {
    if (b.dataset.provider !== undefined && b.dataset.provider === currentProvider) b.classList.add('active-provider');
  });
  currentType = type;
  renderFiltered();
}

function setProvider(provider, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active-provider'));
  btn.classList.add('active-provider');
  currentProvider = provider;
  renderFiltered();
}

function setProviderFromSelect(select) {
  currentProvider = select.value;
  renderFiltered();
}

function renderFiltered() {
  let data = currentType === 'movie' ? allMovies : allSeries;
  if (currentProvider !== 'all') {
    data = data.filter(m => m.provider === currentProvider);
  } else {
    const seen = new Map();
    for (const m of data) {
      if (!seen.has(m.id) || m.rating > seen.get(m.id).rating) seen.set(m.id, m);
    }
    data = Array.from(seen.values());
  }
  data = [...data].sort((a, b) => b.rating - a.rating);
  renderMedia(data);
}

async function loadData() {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;padding:60px 0;">Loading...</p>';
  try {
    const res = await fetch('tmdb_data.json?v=2', {cache: 'no-cache'});
    const data = await res.json();
    for (const [provider, content] of Object.entries(data)) {
      for (const m of content.movies) {
        allMovies.push({
          id: m.id,
          title: m.title,
          year: m.release_date ? m.release_date.slice(0, 4) : '?',
          rating: m.vote_average,
          genres: (m.genre_ids || []).map(id => GENRE_MAP[id]).filter(Boolean).slice(0, 2),
          synopsis: m.overview,
          poster: m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : null,
          tmdb: `https://www.themoviedb.org/movie/${m.id}`,
          provider
        });
      }
      for (const s of content.series) {
        allSeries.push({
          id: s.id,
          title: s.name,
          year: s.first_air_date ? s.first_air_date.slice(0, 4) : '?',
          rating: s.vote_average,
          genres: (s.genre_ids || []).map(id => GENRE_MAP[id]).filter(Boolean).slice(0, 2),
          synopsis: s.overview,
          poster: s.poster_path ? `https://image.tmdb.org/t/p/w500${s.poster_path}` : null,
          tmdb: `https://www.themoviedb.org/tv/${s.id}`,
          provider
        });
      }
    }
    renderFiltered();
  } catch (e) {
    grid.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;padding:60px 0;">Failed to load data.</p>';
  }
}

loadData();
</script>

</body>
</html>
