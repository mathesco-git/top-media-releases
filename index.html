  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080d;

    --card-hover: #1a1a28;
    --accent: #e5a00d;
    --accent2: #ff6b35;
    --text: #f0f0f0;

    --border: #222233;
  }

  body {

    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 70px 40px 50px;
    text-align: center;
    background: linear-gradient(180deg, #0d0d18 0%, var(--bg) 100%);
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 30% 20%, rgba(229,160,13,0.08), transparent),
      radial-gradient(ellipse 500px 300px at 70% 60%, rgba(255,107,53,0.06), transparent);
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 900;
    letter-spacing: -1px;
    position: relative;
  }
  .hero h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 1.05rem;
    margin-top: 10px;
    position: relative;
  }
  .hero .pill {
    display: inline-block;
    margin-top: 16px;
    padding: 5px 16px;
    background: rgba(229,160,13,0.1);
    border: 1px solid rgba(229,160,13,0.3);
    border-radius: 20px;
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: 600;
    position: relative;
  }

  /* FILTERS */
  .filters {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 40px 36px;
  }
  .filters button {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filters button:hover, .filters button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* CONTAINER */
  .container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    border-color: rgba(229,160,13,0.4);
  }

  /* POSTER AREA */
  .poster-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/10;
    overflow: hidden;
  }
  .poster-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .card:hover .poster-wrap img { transform: scale(1.05); }

  /* CSS FALLBACK POSTER */
  .poster-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .poster-fallback::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
  }
  .poster-fallback .title-overlay {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    text-align: center;
    line-height: 1.2;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    position: relative;
    z-index: 2;
  }
  .poster-fallback .director-overlay {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    margin-top: 6px;
    position: relative;
    z-index: 2;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Genre-based gradients */
  .genre-action { background: linear-gradient(135deg, #1a0a00 0%, #4a1500 30%, #8b2500 60%, #2a0a00 100%); }
  .genre-drama { background: linear-gradient(135deg, #0a0a1a 0%, #1a1040 30%, #2a1560 60%, #0a0a1a 100%); }
  .genre-sci-fi { background: linear-gradient(135deg, #000a14 0%, #002040 30%, #003060 60%, #001020 100%); }
  .genre-comedy { background: linear-gradient(135deg, #0a1400 0%, #1a3000 30%, #2a4a10 60%, #0a1400 100%); }
  .genre-biography { background: linear-gradient(135deg, #14100a 0%, #3a2a10 30%, #5a4020 60%, #14100a 100%); }

  .poster-wrap .gradient-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);

    font-weight: 700;
    font-size: 0.9rem;

    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.55;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;

    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;

    text-decoration: none;

for (let i = 0; i < movies.length; i++) {
  movies[i].provider = providers[i % providers.length];
}

// Mockup top 20 series per provider
const series = [];
for (let p of providers) {
  for (let i = 1; i <= 4; i++) { // 4 per provider, for 20 total
    series.push({
      title: `${p} Series ${i}`,
      year: 2026 - (i % 2),
      rating: (7 + Math.random()).toFixed(1),
      genres: ["drama", (i % 2 === 0 ? "comedy" : "sci-fi")],
      creator: `Creator ${i}`,
      cast: `Star ${i}, Star ${i+1}`,
      synopsis: `A gripping new series from ${p}, season ${i}.`,
      poster: "posters/placeholder-series.jpg",
      trailer: "https://www.youtube.com/",
      imdb: "https://www.imdb.com/",
      provider: p
    });
  }
}

// Genre-to-CSS class mapping
function genreClass(genres) {
  if (genres.includes('action')) return 'genre-action';
  if (genres.includes('sci-fi')) return 'genre-sci-fi';
  if (genres.includes('comedy')) return 'genre-comedy';
  if (genres.includes('biography')) return 'genre-biography';
  return 'genre-drama';
}

const ytSvg = `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path d="M9.545 15.568V8.432L15.818 12z" fill="#fff"/></svg>`;

function renderMedia(list) {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '';
  list.forEach((m, i) => {
    const ratingDisplay = m.rating ? (typeof m.rating === 'number' ? m.rating.toFixed(1) : m.rating) : 'TBD';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="poster-wrap" data-title="${m.title}">
        <img src="${m.poster}" alt="${m.title}" loading="lazy"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="poster-fallback ${genreClass(m.genres)}" style="display:none;">
          <div class="title-overlay">${m.title}</div>
          <div class="director-overlay">${m.director || m.creator || ''}</div>
        </div>
        <div class="gradient-overlay"></div>
        <div class="year-badge">${m.year}</div>
        <div class="rating-badge"><span class="star">&#9733;</span> ${ratingDisplay}</div>
        <div class="rank-badge">#${i + 1}</div>
      </div>
      <div class="card-body">
        <h2>${m.title}</h2>
        <div class="card-meta">
          ${m.genres.map(g => `<span>${g.charAt(0).toUpperCase() + g.slice(1)}</span>`).join('')}
          <span>${m.provider}</span>
        </div>
        <div class="director">${m.director ? `Dir: <strong>${m.director}</strong>` : `Creator: <strong>${m.creator}</strong>`} &bull; ${m.cast}</div>
        <p class="synopsis">${m.synopsis}</p>
        <div class="card-actions">
          <a href="${m.trailer}" target="_blank" rel="noopener" class="btn-trailer">
            ${ytSvg} Watch Trailer
          </a>
          <a href="${m.imdb}" target="_blank" rel="noopener" class="btn-imdb">IMDb</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// State
let currentType = 'movie';
let currentProvider = 'all';

function setType(type, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
  renderFiltered();
}

function setProvider(provider, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active-provider'));
  btn.classList.add('active-provider');
  currentProvider = provider;
  renderFiltered();
}

function renderFiltered() {
  let data = currentType === 'movie' ? movies : series;
  if (currentProvider !== 'all') {
    data = data.filter(m => m.provider === currentProvider);
  }
  renderMedia(data.slice(0, 20));
}

// Fetch a poster URL from TMDB and inject into the img element
async function loadPoster(imgEl, posterKey, movieTitle) {
  const tmdbId = tmdbIds[posterKey];
  try {
    let posterPath = null;
    if (tmdbId) {
      const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}`);
      const data = await res.json();
      posterPath = data.poster_path;
    }
    if (!posterPath) {
      const q = encodeURIComponent(movieTitle);
      const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${q}`);
      const data = await res.json();
      posterPath = data.results?.[0]?.poster_path;
    }
    if (posterPath) {
      imgEl.src = `https://image.tmdb.org/t/p/w500${posterPath}`;
      imgEl.style.display = '';
      // Hide the CSS fallback
      const fallback = imgEl.nextElementSibling;
      if (fallback && fallback.classList.contains('poster-fallback')) {
        fallback.style.display = 'none';
      }
    }
  } catch (e) {
    // Keep CSS fallback visible
  }
}
