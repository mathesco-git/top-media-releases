    :root {
        --accent: #2196f3;
        --accent-dark: #1769aa;
        --accent-light: #e3f2fd;
        --border: #1a237e;
        --card-bg: #0d1b2a;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 70px 20px 50px;
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 16px;
    }
    .pill {
      display: inline-block;
      background: rgba(229,160,13,0.15);
      border: 1px solid rgba(229,160,13,0.3);
      color: var(--accent);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* FILTERS */
      .filters {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 0 40px 36px;
        margin: 0 auto 24px auto;
        max-width: 900px;
      }
    .filters button {
        padding: 9px 22px;
        border-radius: 22px;
        border: 1.5px solid var(--accent);
        background: var(--accent-light);
        color: var(--accent-dark);
        font-family: inherit;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(33,150,243,0.08);
        outline: none;
    }
    .filters button:hover { border-color: var(--accent); color: var(--accent); }
    .filters button.active,
    .filters button.active-provider {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* GRID */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      border-color: rgba(229,160,13,0.4);
    }

    /* POSTER AREA */
    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
    }
    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .card:hover .poster-wrap img { transform: scale(1.05); }

    /* CSS FALLBACK POSTER */
    .poster-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .poster-fallback::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
    }
    .poster-fallback .title-overlay {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }
    .poster-fallback .director-overlay {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
      position: relative;
      z-index: 2;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Genre-based gradients */
      .genre-action { background: linear-gradient(135deg, #1565c0 0%, #42a5f5 100%); }
      .genre-drama { background: linear-gradient(135deg, #283593 0%, #5c6bc0 100%); }
      .genre-sci-fi { background: linear-gradient(135deg, #0d47a1 0%, #00bcd4 100%); }
      .genre-comedy { background: linear-gradient(135deg, #1976d2 0%, #64b5f6 100%); }
      .genre-biography { background: linear-gradient(135deg, #1e88e5 0%, #90caf9 100%); }

    .poster-wrap .gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .poster-wrap .year-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--accent);
      color: #000;
      padding: 3px 10px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.75rem;
      z-index: 3;
    }
    .poster-wrap .rating-badge {

      -webkit-box-orient: vertical;

    }

  if (genres.includes('action')) return 'genre-action';

  if (genres.includes('biography')) return 'genre-biography';
  return 'genre-drama';
}

const ytSvg = `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path d="M9.545 15.568V8.432L15.818 12z" fill="#fff"/></svg>`;

function renderMedia(list) {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '';
  list.forEach((m, i) => {
    const ratingDisplay = m.rating ? (typeof m.rating === 'number' ? m.rating.toFixed(1) : m.rating) : 'TBD';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="poster-wrap" data-title="${m.title}">
        <img src="${m.poster}" alt="${m.title}" loading="lazy"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="poster-fallback ${genreClass(m.genres)}" style="display:none;">
          <div class="title-overlay">${m.title}</div>
          <div class="director-overlay">${m.director || m.creator || ''}</div>
        </div>
        <div class="gradient-overlay"></div>
        <div class="year-badge">${m.year}</div>
        <div class="rating-badge"><span class="star">&#9733;</span> ${ratingDisplay}</div>
        <div class="rank-badge">#${i + 1}</div>
      </div>
      <div class="card-body">
        <h2>${m.title}</h2>
        <div class="card-meta">
          ${m.genres.map(g => `<span>${g.charAt(0).toUpperCase() + g.slice(1)}</span>`).join('')}
          <span>${m.provider}</span>
        </div>
        <div class="director">${m.director ? `Dir: <strong>${m.director}</strong>` : `Creator: <strong>${m.creator}</strong>`} &bull; ${m.cast}</div>
        <p class="synopsis">${m.synopsis}</p>
        <div class="card-actions">
          <a href="${m.trailer}" target="_blank" rel="noopener" class="btn-trailer">
            ${ytSvg} Watch Trailer
          </a>
          <a href="${m.imdb}" target="_blank" rel="noopener" class="btn-imdb">IMDb</a>
        </div>
      </div>
    `;
    grid.appendChild(card);

    // Attempt to load TMDB poster if a mapping exists for this movie
    const imgEl = card.querySelector('img');
    if (m.poster && tmdbIds.hasOwnProperty(m.poster)) {
      loadPoster(imgEl, m.poster, m.title);
    }
  });
}

// State
let currentType = 'movie';
let currentProvider = 'all';

function setType(type, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
  renderFiltered();
}

function setProvider(provider, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active-provider'));
  btn.classList.add('active-provider');
  currentProvider = provider;
  renderFiltered();
}

function renderFiltered() {
  let data = currentType === 'movie' ? movies : series;
  if (currentProvider !== 'all') {
    data = data.filter(m => m.provider === currentProvider);
    renderMedia(data);
  } else {
    renderMedia(data.slice(0, 20));
  }
}

// TMDB API key — used to load poster images in the browser
const TMDB_KEY = "d5d6024b31893c1258dfc2dba7835c04";

// TMDB IDs for each movie (matched by poster filename)
const tmdbIds = {
  "posters/project-hail-mary.jpg":        687163,
  "posters/hamnet.jpg":                   858024,
  "posters/marty-supreme.jpg":            1317288,
  "posters/one-battle-after-another.jpg": 1064028,
  "posters/superman.jpg":                 1061474,
  "posters/how-to-train-your-dragon.jpg": 1010600,
  "posters/f1.jpg":                       950396,
  "posters/companion.jpg":                1010581,
  "posters/train-dreams.jpg":             1197306,
  "posters/good-luck-have-fun.jpg":       null,
  "posters/wake-up-dead-man.jpg":         1014505,
  "posters/mission-impossible.jpg":       575264,
  "posters/thunderbolts.jpg":             986056,

  "posters/a-private-life.jpg":           null,
  "posters/the-odyssey.jpg":             1241674,
};

// Fetch a poster URL from TMDB and inject into the img element
async function loadPoster(imgEl, posterKey, movieTitle) {
  const tmdbId = tmdbIds[posterKey];
  try {
    let posterPath = null;
    if (tmdbId) {
      const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}`);
      const data = await res.json();
      posterPath = data.poster_path;
    }
    if (!posterPath) {
      const q = encodeURIComponent(movieTitle);
      const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${q}`);
      const data = await res.json();
      posterPath = data.results?.[0]?.poster_path;
    }
    if (posterPath) {
      imgEl.src = `https://image.tmdb.org/t/p/w500${posterPath}`;
      imgEl.style.display = '';
      const fallback = imgEl.nextElementSibling;
      if (fallback && fallback.classList.contains('poster-fallback')) {
        fallback.style.display = 'none';
      }
    }
  } catch (e) {
    // Keep CSS fallback visible
  }
}

// Initial render
renderFiltered();
