<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Media Releases</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #e5a00d;
      --accent-dark: #b97a00;
      --accent-light: #fffbe6;
      --border: #333;
      --card-bg: #181818;
      --text-muted: #aaa;
      --background: #0f0f0f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--background);
        color: #f0f0f0;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 70px 20px 50px;
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 16px;
    }
    .pill {
      display: inline-block;
      background: rgba(229,160,13,0.15);
      border: 1px solid rgba(229,160,13,0.3);
      color: var(--accent);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 18px 24px;
      background: #141414;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .filters button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 16px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filters button:hover { border-color: var(--accent); color: var(--accent); }
    .filters button.active,
    .filters button.active-provider {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* GRID */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      border-color: rgba(229,160,13,0.4);
    }

    /* POSTER AREA */
    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
    }
    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .card:hover .poster-wrap img { transform: scale(1.05); }

    /* CSS FALLBACK POSTER */
    .poster-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .poster-fallback::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
    }
    .poster-fallback .title-overlay {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }
    .poster-fallback .director-overlay {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
      position: relative;
      z-index: 2;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Genre-based gradients */
      .genre-action   { background: linear-gradient(135deg, #1a0a00 0%, #4a1500 30%, #8b2500 60%, #2a0a00 100%); }
      .genre-drama    { background: linear-gradient(135deg, #0a0a1a 0%, #1a1040 30%, #2a1560 60%, #0a0a1a 100%); }
      .genre-sci-fi   { background: linear-gradient(135deg, #000a14 0%, #002040 30%, #003060 60%, #001020 100%); }
      .genre-comedy   { background: linear-gradient(135deg, #0a1400 0%, #1a3000 30%, #2a4a10 60%, #0a1400 100%); }
      .genre-biography{ background: linear-gradient(135deg, #14100a 0%, #3a2a10 30%, #5a4020 60%, #14100a 100%); }

    .poster-wrap .gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* BADGES */
    .poster-wrap .year-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--accent);
      color: #000;
      padding: 3px 10px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.75rem;
      z-index: 3;
    }
    .poster-wrap .rating-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 5px 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 700;
      font-size: 0.9rem;
      z-index: 3;
    }
    .rating-badge .star { color: var(--accent); }
    .rank-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: rgba(255,255,255,0.15);
      z-index: 3;
      line-height: 1;
    }

    /* CARD BODY */
    .card-body {
      padding: 18px 20px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-body h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .card-meta span {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .card-body .director {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-body .director strong { color: #ccc; font-weight: 500; }
    .card-body .synopsis {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.55;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-trailer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: #e00;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      flex: 1;
      justify-content: center;
    }
    .btn-trailer:hover { background: #c00; transform: scale(1.02); }
    .btn-trailer svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }
    .btn-imdb {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-imdb:hover { background: #f5b82e; transform: scale(1.02); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero { padding: 50px 20px 36px; }
      .container { padding: 0 14px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 1200px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>Top Rated Media Releases <span></span></h1>
  <p>The highest-scoring new releases &mdash; curated for you</p>
  <div class="pill">Updated March 2026</div>
  <button id="refreshBtn" style="margin-top:24px;padding:10px 28px;font-size:1rem;font-weight:700;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;">Refresh Data</button>
</div>

<div class="filters" style="justify-content: center;">
  <button class="active" onclick="setType('movie', this)">Movies</button>
  <button onclick="setType('series', this)">Series</button>
  <span style="margin: 0 12px; color: var(--text-muted);">|</span>
  <button class="active-provider" onclick="setProvider('all', this)">All Providers</button>
  <button onclick="setProvider('AppleTV', this)">AppleTV</button>
  <button onclick="setProvider('HBO Max', this)">HBO Max</button>
  <button onclick="setProvider('Netflix', this)">Netflix</button>
  <button onclick="setProvider('Paramount', this)">Paramount</button>
  <button onclick="setProvider('Hulu', this)">Hulu</button>
  <button onclick="setProvider('Prime', this)">Prime</button>
  <button onclick="setProvider('Disney', this)">Disney</button>
</div>

<div class="container">
  <div class="grid" id="mediaGrid"></div>
</div>

<footer>CineScore &bull; Data sourced from IMDB &bull; March 2026</footer>

<script>
const GENRE_MAP = {
  28: 'Action', 12: 'Adventure', 16: 'Animation', 35: 'Comedy',
  80: 'Crime', 99: 'Documentary', 18: 'Drama', 10751: 'Family',
  14: 'Fantasy', 36: 'History', 27: 'Horror', 10402: 'Music',
  9648: 'Mystery', 10749: 'Romance', 878: 'Sci-Fi', 10770: 'TV Movie',
  53: 'Thriller', 10752: 'War', 37: 'Western'
};

function genreClass(genres) {
  const lower = genres.map(g => g.toLowerCase());
  if (lower.some(g => g.includes('action'))) return 'genre-action';
  if (lower.some(g => g.includes('sci'))) return 'genre-sci-fi';
  if (lower.some(g => g.includes('comedy'))) return 'genre-comedy';
  return 'genre-drama';
}

let allMovies = [];
let allSeries = [];
let currentType = 'movie';
let currentProvider = 'all';

function renderMedia(list) {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px 0;">No titles found.</p>';
    return;
  }
  list.forEach((m, i) => {
    const ratingDisplay = m.rating ? parseFloat(m.rating).toFixed(1) : 'TBD';
    const genres = m.genres.length ? m.genres : ['Other'];
    const hasPoster = !!m.poster;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="poster-wrap">
        <img src="${hasPoster ? m.poster : ''}" alt="${m.title}" loading="lazy"
             style="${hasPoster ? '' : 'display:none'}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="poster-fallback ${genreClass(genres)}" style="${hasPoster ? 'display:none' : 'display:flex'}">
          <div class="title-overlay">${m.title}</div>
        </div>
        <div class="gradient-overlay"></div>
        <div class="year-badge">${m.year}</div>
        <div class="rating-badge"><span class="star">&#9733;</span> ${ratingDisplay}</div>
        <div class="rank-badge">#${i + 1}</div>
      </div>
      <div class="card-body">
        <h2>${m.title}</h2>
        <div class="card-meta">
          ${genres.map(g => `<span>${g}</span>`).join('')}
          <span>${m.provider}</span>
        </div>
        <p class="synopsis">${m.synopsis || 'No description available.'}</p>
        <div class="card-actions">
          <a href="${m.tmdb}" target="_blank" rel="noopener" class="btn-imdb">More Info</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function setType(type, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
  renderFiltered();
}

function setProvider(provider, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active-provider'));
  btn.classList.add('active-provider');
  currentProvider = provider;
  renderFiltered();
}

function renderFiltered() {
  let data = currentType === 'movie' ? allMovies : allSeries;
  if (currentProvider !== 'all') {
    data = data.filter(m => m.provider === currentProvider);
  } else {
    // Deduplicate by TMDB id, keep highest-rated occurrence
    const seen = new Map();
    for (const m of data) {
      if (!seen.has(m.id) || m.rating > seen.get(m.id).rating) seen.set(m.id, m);
    }
    data = Array.from(seen.values());
  }
  data = [...data].sort((a, b) => b.rating - a.rating);
  renderMedia(data);
}

async function loadData() {
  const grid = document.getElementById('mediaGrid');
  grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px 0;">Loading...</p>';
  try {
    const res = await fetch('tmdb_data.json');
    const data = await res.json();
    for (const [provider, content] of Object.entries(data)) {
      for (const m of content.movies) {
        allMovies.push({
          id: m.id,
          title: m.title,
          year: m.release_date ? m.release_date.slice(0, 4) : '?',
          rating: m.vote_average,
          genres: (m.genre_ids || []).map(id => GENRE_MAP[id]).filter(Boolean).slice(0, 2),
          synopsis: m.overview,
          poster: m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : null,
          tmdb: `https://www.themoviedb.org/movie/${m.id}`,
          provider
        });
      }
      for (const s of content.series) {
        allSeries.push({
          id: s.id,
          title: s.name,
          year: s.first_air_date ? s.first_air_date.slice(0, 4) : '?',
          rating: s.vote_average,
          genres: (s.genre_ids || []).map(id => GENRE_MAP[id]).filter(Boolean).slice(0, 2),
          synopsis: s.overview,
          poster: s.poster_path ? `https://image.tmdb.org/t/p/w500${s.poster_path}` : null,
          tmdb: `https://www.themoviedb.org/tv/${s.id}`,
          provider
        });
      }
    }
    renderFiltered();
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px 0;">Failed to load data.</p>';
  }
}

loadData();
</script>

</body>
</html>
